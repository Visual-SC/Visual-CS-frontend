services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: visualsc-frontend:latest
    ports:
      - "8080:80"

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: visualsc-frontend-dev:latest
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:3001}
    volumes:
      - .:/app
      - /app/node_modules
